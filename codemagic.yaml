workflows:
  ios-workflow:
    name: CipkoTest iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: "16.2"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cipkotest.app
      vars:
        XCODE_PROJECT: "CipkoTest.xcodeproj"
        XCODE_SCHEME: "CipkoTest"
        BUNDLE_ID: "com.cipkotest.app"
        APP_STORE_APPLE_ID: "6761487757"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/sourcepackages"
      - name: Fix app icon
        script: |
          ICON_PATH="CipkoTest/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"
          if [ -f "$ICON_PATH" ]; then
            sips -s format png -s formatOptions best \
              --resampleHeightWidth 1024 1024 \
              "$ICON_PATH" --out "$ICON_PATH"
            echo "Icon fixed: $(sips -g pixelHeight -g pixelWidth -g hasAlpha "$ICON_PATH")"
          else
            echo "Icon not found, downloading from cipkotest.com..."
            curl -L "https://cipkotest.com/android-chrome-512x512.png" -o /tmp/icon_src.png
            sips -s format png -s formatOptions best \
              --resampleHeightWidth 1024 1024 \
              /tmp/icon_src.png --out "$ICON_PATH"
          fi
      - name: Set up code signing settings
        script: |
          xcode-project use-profiles
      - name: Create ExportOptions.plist
        script: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>839UK2J8H3</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.cipkotest.app</key>
              <string>CipkoTest AppStore</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build ipa
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/CipkoTest.xcarchive \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/sourcepackages" \
            archive \
            DEVELOPMENT_TEAM=839UK2J8H3

          xcodebuild \
            -exportArchive \
            -archivePath build/CipkoTest.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
