name: CipkoTest
options:
  bundleIdPrefix: com.cipkotest
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.18.0"

targets:
  CipkoTest:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: CipkoTest
    resources:
      - path: CipkoTest/Assets.xcassets
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    info:
      path: CipkoTest/Info.plist
      properties:
        CFBundleDisplayName: ÇipkoTest
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "3"
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: Fotoğraflı soru çözmek için kameraya ihtiyaç duyulmaktadır.
        NSPhotoLibraryUsageDescription: Fotoğraflı soru çözmek için galeri erişimine ihtiyaç duyulmaktadır.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cipkotest.app
        INFOPLIST_FILE: CipkoTest/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: false
        SUPPORTS_MACCATALYST: false

schemes:
  CipkoTest:
    build:
      targets:
        CipkoTest: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
